name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: salt-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: salt-aarch64-linux
          - os: macos-latest
            target: x86_64-macos
            artifact: salt-x86_64-macos
          - os: macos-latest
            target: aarch64-macos
            artifact: salt-aarch64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Build
        run: zig build --release=safe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          tar -czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin salt

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
